apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opa-bundles
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "6"
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: "{{ env REPO_URL }}"
    targetRevision: main
    path: impl/helixgitpx-platform/helm/opa-bundles
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: helix-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
