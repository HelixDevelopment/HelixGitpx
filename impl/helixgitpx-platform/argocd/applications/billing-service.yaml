apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/HelixGitpx/HelixGitpx.git
    path: impl/helixgitpx/services/billing-service/deploy/helm
    targetRevision: main
    helm: { releaseName: billing-service }
  destination: { server: https://kubernetes.default.svc, namespace: helixgitpx }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
