apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zoekt
  namespace: argocd
  annotations: { argocd.argoproj.io/sync-wave: "7" }
  finalizers: [resources-finalizer.argocd.argoproj.io]
spec:
  project: default
  source:
    repoURL: "{{ env REPO_URL }}"
    targetRevision: main
    path: impl/helixgitpx-platform/helm/zoekt
    helm: { valueFiles: [values.yaml] }
  destination: { server: https://kubernetes.default.svc, namespace: helix-ai }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
