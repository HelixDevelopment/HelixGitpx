apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docs-site
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/HelixGitpx/HelixGitpx.git
    path: impl/helixgitpx-docs-site/deploy/helm
    targetRevision: main
    helm: { releaseName: docs-site }
  destination: { server: https://kubernetes.default.svc, namespace: marketing }
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
