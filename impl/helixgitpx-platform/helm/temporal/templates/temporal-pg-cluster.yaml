apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: helix-temporal-pg
  namespace: helix-data
spec:
  instances: {{ .Values.temporalPg.instances | default 3 }}
  storage:
    size: {{ .Values.temporalPg.storage.size | default "10Gi" }}
  bootstrap:
    initdb:
      database: temporal
      owner: temporal
