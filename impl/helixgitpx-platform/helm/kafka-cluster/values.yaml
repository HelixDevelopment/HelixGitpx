kafka:
  name: helix-kafka
  replicas: 3
  kRaft:
    enabled: true
  storage:
    size: 100Gi
  resources:
    requests: { cpu: 500m, memory: 2Gi }
    limits:   { cpu: 2,    memory: 4Gi }

topics:
  - name: hello.said
    partitions: 3
    replicas: 3
    retentionMs: 604800000
  - name: hello.outbox
    partitions: 3
    replicas: 3
    retentionMs: 2592000000
