mimir-distributed:
  minio:
    enabled: false
  global:
    extraEnvFrom:
      - secretRef: { name: minio-root-creds }
  mimir:
    structuredConfig:
      common:
        storage:
          backend: s3
          s3:
            endpoint: minio.helix-system.svc:9000
            access_key_id: ${MINIO_ROOT_USER}
            secret_access_key: ${MINIO_ROOT_PASSWORD}
            insecure: true
            bucket_name: mimir-blocks
  ingester:
    replicas: 3
  distributor:
    replicas: 3
  store_gateway:
    replicas: 3
  compactor:
    replicas: 1
  querier:
    replicas: 3
  query_frontend:
    replicas: 2
