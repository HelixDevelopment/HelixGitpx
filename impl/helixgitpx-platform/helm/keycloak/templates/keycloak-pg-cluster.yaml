apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: helix-kc-pg
  namespace: helix-identity
spec:
  instances: {{ .Values.kcPg.instances | default 3 }}
  storage:
    size: {{ .Values.kcPg.storage.size | default "10Gi" }}
  bootstrap:
    initdb:
      database: keycloak
      owner: keycloak
