apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaMirrorMaker2
metadata:
  name: helixgitpx-mm2
spec:
  version: {{ .Chart.AppVersion | quote }}
  replicas: {{ .Values.replicas }}
  connectCluster: {{ .Values.target.clusterName }}
  clusters:
    - alias: {{ .Values.source.clusterName }}
      bootstrapServers: {{ .Values.source.bootstrapServers }}
    - alias: {{ .Values.target.clusterName }}
      bootstrapServers: {{ .Values.target.bootstrapServers }}
      config:
        config.storage.replication.factor: 3
        offset.storage.replication.factor: 3
        status.storage.replication.factor: 3
  mirrors:
    - sourceCluster: {{ .Values.source.clusterName }}
      targetCluster: {{ .Values.target.clusterName }}
      sourceConnector:
        tasksMax: 10
        config:
          replication.factor: 3
          offset-syncs.topic.replication.factor: 3
          sync.topic.acls.enabled: "true"
          refresh.topics.interval.seconds: {{ .Values.refreshIntervalSeconds }}
      heartbeatConnector:
        config:
          heartbeats.topic.replication.factor: 3
      checkpointConnector:
        config:
          checkpoints.topic.replication.factor: 3
      topicsPattern: {{ .Values.topicsPattern | quote }}
      groupsPattern: {{ .Values.groupsPattern | quote }}
