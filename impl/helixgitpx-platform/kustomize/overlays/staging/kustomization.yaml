apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd
resources:
  - ../../../argocd/bootstrap
  - ../../../argocd/applications

patches:
  - target: { kind: Application }
    patch: |-
      - op: add
        path: /spec/source/helm/parameters
        value:
          - name: global.env
            value: staging
  - target: { kind: Application, name: cert-manager }
    patch: |-
      - op: add
        path: /spec/source/helm/parameters/-
        value:
          name: issuer.mode
          value: letsencrypt
      - op: add
        path: /spec/source/helm/parameters/-
        value:
          name: issuer.letsencrypt.email
          value: ops@helixgitpx.dev
