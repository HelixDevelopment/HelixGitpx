syntax = "proto3";
package helixgitpx.repo.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service RepoService {
  rpc Create(CreateRepoRequest) returns (Repo);
  rpc Get(GetRepoRequest) returns (Repo);
  rpc List(ListReposRequest) returns (ListReposResponse);
  rpc Update(UpdateRepoRequest) returns (Repo);
  rpc Delete(DeleteRepoRequest) returns (google.protobuf.Empty);
}

service RefService {
  rpc List(ListRefsRequest) returns (ListRefsResponse);
  rpc Protect(ProtectRefRequest) returns (BranchProtection);
  rpc Unprotect(UnprotectRefRequest) returns (google.protobuf.Empty);
}

message Repo {
  string id = 1;
  string org_id = 2;
  string slug = 3;
  string default_branch = 4;
  bool lfs_enabled = 5;
  google.protobuf.Timestamp created_at = 6;
}

message BranchProtection {
  string repo_id = 1;
  string pattern = 2;
  bool require_signed = 3;
  int32 required_reviewers = 4;
  google.protobuf.Timestamp updated_at = 5;
}

message Ref {
  string name = 1;
  string sha = 2;
}

message CreateRepoRequest {
  string org_id = 1;
  string slug = 2;
  string default_branch = 3;
  bool lfs_enabled = 4;
}
message GetRepoRequest {
  string org_id = 1;
  string slug = 2;
}
message UpdateRepoRequest {
  string org_id = 1;
  string slug = 2;
  string default_branch = 3;
  bool lfs_enabled = 4;
}
message DeleteRepoRequest {
  string org_id = 1;
  string slug = 2;
}
message ListReposRequest {
  string org_id = 1;
}
message ListReposResponse {
  repeated Repo repos = 1;
}
message ListRefsRequest {
  string repo_id = 1;
}
message ListRefsResponse {
  repeated Ref refs = 1;
}
message ProtectRefRequest {
  string repo_id = 1;
  string pattern = 2;
  bool require_signed = 3;
  int32 required_reviewers = 4;
}
message UnprotectRefRequest {
  string repo_id = 1;
  string pattern = 2;
}
