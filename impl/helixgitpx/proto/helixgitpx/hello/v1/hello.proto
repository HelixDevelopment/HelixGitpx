syntax = "proto3";

package helixgitpx.hello.v1;

// HelloService is the spine service for M1 Foundation.
// It exercises platform/{grpc,gin,pg,redis,kafka} end-to-end.
//
// REST binding is implemented directly by the Gin router in services/hello
// rather than via google.api.http annotations, so this module has no BSR
// dependency on googleapis. Later milestones may re-introduce it once a
// grpc-gateway codegen path is wired.
service HelloService {
  // SayHello returns a greeting and (as a side effect) increments a counter
  // in Postgres, caches the last greeting in Redis, and emits hello.said to Kafka.
  rpc SayHello(SayHelloRequest) returns (SayHelloResponse) {}
}

message SayHelloRequest {
  string name = 1;
}

message SayHelloResponse {
  string greeting = 1;
  int64 count = 2;
}
