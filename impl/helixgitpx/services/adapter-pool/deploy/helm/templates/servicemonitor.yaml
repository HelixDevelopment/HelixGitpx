{{- if .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}
  labels:
    release: prom
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: hello
  endpoints:
    - { port: health, interval: 15s, path: /metrics }
{{- end }}
