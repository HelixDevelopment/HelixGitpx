image:
  repository: helixgitpx/repo
  tag: dev
  pullPolicy: IfNotPresent
env:
  REPO_HTTP_ADDR: ":8001"
  REPO_GRPC_ADDR: ":9001"
  REPO_HEALTH_ADDR: ":8081"
resources:
  limits:   { cpu: "1", memory: "256Mi" }
  requests: { cpu: "100m", memory: "128Mi" }

migrate:
  enabled: true
  image:
    repository: helixgitpx/repo
    tag: dev
  env:
    - name: REPO_POSTGRES_DSN
      valueFrom:
        secretKeyRef:
          name: repo-pg-secret
          key: dsn

ingress:
  enabled: true
  className: nginx
  host: repo.helix.local
  tlsSecret: repo-helix-local-tls

monitoring:
  serviceMonitor:
    enabled: true

vault:
  enabled: true
  role: repo
  kvPath: kv/repo
