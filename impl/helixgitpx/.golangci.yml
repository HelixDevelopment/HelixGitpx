run:
  timeout: 5m
  go: "1.23"

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - revive
    - gosec
    - gofumpt
    - goimports
    - misspell
    - unparam
    - prealloc
    - gocritic
    - bodyclose
    - contextcheck
    - errorlint
    - nilerr
    - noctx
    - thelper
    - tparallel
    - unconvert

linters-settings:
  gofumpt:
    extra-rules: true
  revive:
    rules:
      - name: exported
        arguments: [checkPrivateReceivers, sayRepetitiveInsteadOfStutters]
  errcheck:
    check-type-assertions: true

issues:
  exclude-rules:
    - path: _test\.go
      linters: [gosec, errcheck, unparam]
