apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ollama-hpa, namespace: ai }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ollama }
  minReplicas: 1
  maxReplicas: 6
  metrics:
    - type: Pods
      pods:
        metric: { name: ollama_queue_depth }
        target: { type: AverageValue, averageValue: "4" }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: vllm-hpa, namespace: ai }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: vllm }
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: Pods
      pods:
        metric: { name: vllm_queue_depth }
        target: { type: AverageValue, averageValue: "2" }
