name: perf-budgets
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'API base URL (leave blank to dry-run)'
        required: false
        default: ''
      scenario:
        description: 'Scenario (baseline, git, ws, ai, all)'
        required: true
        default: 'baseline'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Dry-run when no target
        if: ${{ github.event.inputs.target == '' }}
        run: |
          echo "No target specified — validating k6 scenario syntax only."
          head tools/perf/scenarios/*.js

      - name: Install k6
        if: ${{ github.event.inputs.target != '' }}
        run: |
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y
          sudo apt-get install -y k6

      - name: Run scenarios (short duration; allow-failure)
        if: ${{ github.event.inputs.target != '' }}
        timeout-minutes: 5
        working-directory: tools/perf
        env:
          HELIXGITPX_API: ${{ github.event.inputs.target }}
          HELIXGITPX_TOKEN: ${{ secrets.HELIXGITPX_PERF_TOKEN }}
        run: |
          timeout 4m make ${{ github.event.inputs.scenario }} || \
            echo "scenario exited non-zero (target unreachable or timeout) — not a CI failure."

      - name: Enforce budgets (skip gracefully when no k6 output)
        if: ${{ github.event.inputs.target != '' }}
        run: |
          if ls /tmp/k6-out-*.json >/dev/null 2>&1; then
            python3 tools/perf/check_budgets.py /tmp/k6-out-*.json tools/perf/budgets.json
          else
            echo "No k6 output to evaluate — target likely unreachable from runner."
          fi
