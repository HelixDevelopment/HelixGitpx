name: ci-docs
on:
  workflow_dispatch:

concurrency:
  group: ci-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-site:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: impl/helixgitpx-docs-site }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20.18.1" }

      - name: Install deps
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build Docusaurus site
        run: npx docusaurus build

      - uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: impl/helixgitpx-docs-site/build/

  manuals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pandoc + weasyprint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc weasyprint zip

      - name: Toolchain check
        run: bash tools/docs-export/build-all.sh --check

      - name: Build all manuals
        run: bash tools/docs-export/build-all.sh

      - uses: actions/upload-artifact@v4
        with:
          name: manuals-dist
          path: docs/manuals/dist/

  marketing:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: impl/helixgitpx-website }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20.18.1" }
      - run: npm install --no-audit --no-fund --legacy-peer-deps
      - run: npx astro build
      - uses: actions/upload-artifact@v4
        with:
          name: marketing-site
          path: impl/helixgitpx-website/dist/
