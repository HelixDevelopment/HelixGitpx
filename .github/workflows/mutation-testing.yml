name: mutation-testing
# go-mutesting is an optional quality gate — it panics on certain Go
# module layouts. This workflow NEVER hard-fails on runtime panics
# inside the tool; threshold enforcement fires only when a score was
# produced.
on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Go package path (relative to impl/helixgitpx), or `all`'
        required: true
        default: 'services/repo/internal/domain/...'
      threshold:
        description: 'Mutation score threshold 0-100'
        required: true
        default: '60'

jobs:
  mutest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.23.4' }

      - name: Install go-mutesting
        run: go install github.com/zimmski/go-mutesting/cmd/go-mutesting@latest

      - name: Run mutation tests (best-effort)
        working-directory: impl/helixgitpx
        env:
          GOTOOLCHAIN: go1.23.4
        run: |
          target="${{ github.event.inputs.target }}"
          if [ "$target" = "all" ]; then target="./..."; else target="./${target}"; fi
          ~/go/bin/go-mutesting --verbose "$target" 2>&1 | tee /tmp/mutest.out || \
            echo "go-mutesting exited non-zero (common on certain module layouts) — continuing."

      - name: Enforce threshold (only when a score was produced)
        run: |
          score=$(grep -oE 'The mutation score is [0-9.]+' /tmp/mutest.out 2>/dev/null | grep -oE '[0-9.]+' | head -1 || true)
          if [ -z "$score" ]; then
            echo "Mutation score not produced — skipping threshold check."
            exit 0
          fi
          thr="${{ github.event.inputs.threshold }}"
          echo "score=$score threshold=$thr"
          python3 -c "import sys; sys.exit(0 if float('$score') >= float('$thr') else 1)"
