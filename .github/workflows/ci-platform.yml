name: ci-platform
on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [dev, staging, prod-eu]
        default: dev
concurrency:
  group: ci-platform-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: true
jobs:
  platform:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: impl/helixgitpx-platform } }
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.3
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.1
      - name: helm lint
        run: find helm -maxdepth 2 -name Chart.yaml -execdir helm lint . \;
      - name: kustomize build
        run: |
          for overlay in kustomize/overlays/*/; do
            [ -d "$overlay" ] && kubectl kustomize "$overlay" > /dev/null || true
          done
      - name: terraform fmt+validate+plan
        working-directory: impl/helixgitpx-platform/vault/terraform
        run: |
          terraform fmt -check || true
          terraform init -backend=false
          terraform validate
      - uses: kyverno/action-install-cli@v0.2.0
        with:
          release: v1.13.2
      - name: kyverno test
        run: kyverno test kyverno/
      - name: Install checkov
        run: pipx install checkov==3.2.334
      - name: checkov
        run: checkov -d . --config-file checkov/.checkov.yml || true
