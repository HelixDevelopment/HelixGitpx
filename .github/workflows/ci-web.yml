name: ci-web
on:
  workflow_dispatch:
    inputs:
      run-e2e:
        type: boolean
        default: false

concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: impl/helixgitpx-web }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"

      - name: Install deps (lockfile is intentionally ignored in git)
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Build
        run: npx nx build web

      - name: Unit tests
        run: npx nx test web --watchAll=false

      - name: Install Playwright browsers
        if: ${{ inputs.run-e2e }}
        run: npx playwright install --with-deps chromium

      - name: E2E (allow-failure when no live backend)
        if: ${{ inputs.run-e2e }}
        run: npx playwright test || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-dist
          path: impl/helixgitpx-web/dist/
          if-no-files-found: ignore
