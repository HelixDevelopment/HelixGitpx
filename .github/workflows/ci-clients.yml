name: ci-clients
on:
  workflow_dispatch:

concurrency:
  group: ci-clients-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jvm-compile:
    # Compile the shared JVM target. Android/iOS targets require SDK setup
    # and are gated behind separate dispatch inputs when they're ready.
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: impl/helixgitpx-clients }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@v4

      - name: Compile shared (JVM target)
        run: gradle :shared:compileKotlinJvm --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clients-reports
          path: impl/helixgitpx-clients/**/build/reports
          if-no-files-found: ignore
