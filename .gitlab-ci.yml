# GitLab pipeline configuration.
#
# STATUS: pipeline creation is currently suppressed.
#
# Why: GitLab.com requires "Identity verification" (phone + credit-card
# fingerprint) before it will run CI jobs on free-tier projects. Until
# the project owner completes that step, any pipeline GitLab tries to
# create fails with:
#
#   "Identity verification is required in order to run CI jobs"
#
# To avoid persistent red statuses in the GitLab UI, this file tells
# GitLab to **never create** a pipeline — regardless of source (push,
# web, API, trigger, schedule). That keeps the pipelines tab clean.
#
# Re-enabling:
# 1. Project owner completes identity verification at
#    https://gitlab.com/-/profile/account.
# 2. Replace the `workflow:` block below with the one in the commented
#    block near the end of this file.
#
# The real job definitions are preserved verbatim so they're ready to
# run the moment the kill-switch is removed.

workflow:
  rules:
    - when: never

# ---------------------------------------------------------------------------
# Real pipeline config — runs once the kill-switch is removed.
# ---------------------------------------------------------------------------

default:
  image: debian:stable-slim
  timeout: 30 minutes

stages:
  - lint
  - test
  - build

before_script:
  - apt-get update -qq && apt-get install -y -qq --no-install-recommends git python3 python3-yaml curl ca-certificates >/dev/null

verify-artifacts:
  stage: lint
  script:
    - bash scripts/verify-m1-artifacts.sh
    - bash scripts/verify-m2-artifacts.sh
    - bash scripts/verify-argo-paths.sh
    - bash scripts/verify-helm-charts.sh
    - bash scripts/verify-rego.sh

go-test:
  stage: test
  image: golang:1.23.4
  script:
    - cd impl/helixgitpx
    - |
      for mod in $(find . -name go.mod | xargs -n1 dirname); do
        echo "== $mod =="
        (cd "$mod" && go vet ./... && go test -race -count=1 ./...)
      done

web-build:
  stage: build
  image: node:20
  script:
    - cd impl/helixgitpx-web
    - npm install --no-audit --no-fund --legacy-peer-deps
    - npx nx build web
    - npx nx test web --watchAll=false
  artifacts:
    paths: [impl/helixgitpx-web/dist/]
    expire_in: 7 days
    when: always

docs-site:
  stage: build
  image: node:20
  script:
    - cd impl/helixgitpx-docs-site
    - npm install --no-audit --no-fund --legacy-peer-deps
    - npx docusaurus build
  artifacts:
    paths: [impl/helixgitpx-docs-site/build/]
    expire_in: 7 days

# ---------------------------------------------------------------------------
# After identity verification, replace the first `workflow:` block with:
#
# workflow:
#   name: 'Pipeline for $CI_COMMIT_REF_NAME'
#   rules:
#     - if: $CI_PIPELINE_SOURCE == "web"
#     - if: $CI_PIPELINE_SOURCE == "api"
#     - if: $CI_PIPELINE_SOURCE == "trigger"
#     - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == "main"
#
# The current `- when: never` rule rejects every pipeline source.
# ---------------------------------------------------------------------------
