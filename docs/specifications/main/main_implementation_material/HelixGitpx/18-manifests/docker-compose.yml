# docker-compose.yml — Local development stack for HelixGitpx
# Minimal deps to boot the platform on a laptop.
# For full multi-service local dev use Tilt: `tilt up` in repo root.

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: helixgitpx
      POSTGRES_PASSWORD: helixgitpx_dev
      POSTGRES_DB: helixgitpx
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./deploy/dev/pg-init:/docker-entrypoint-initdb.d:ro
    command: ["postgres", "-c", "max_connections=200", "-c", "shared_preload_libraries=pg_stat_statements,pg_trgm"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helixgitpx"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: bitnami/kafka:3.8
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports: ["9092:9092"]
    volumes:
      - kafkadata:/bitnami/kafka

  karapace:
    image: aiven/karapace:latest
    depends_on: [kafka]
    command: ["/opt/karapace/start.sh", "registry"]
    ports: ["8081:8081"]
    environment:
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_PORT: 8081
      KARAPACE_BOOTSTRAP_URI: kafka:9092
      KARAPACE_COMPATIBILITY: BACKWARD
      KARAPACE_TOPIC_NAME: _schemas

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["6379:6379"]
    volumes: [redisdata:/data]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: dev-master-key-change-me
    ports: ["7700:7700"]
    volumes: [meilidata:/meili_data]

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: Admin_Dev_Pwd_123!
    ports: ["9200:9200"]
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes: [osdata:/usr/share/opensearch/data]

  qdrant:
    image: qdrant/qdrant:v1.11.0
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrantdata:/qdrant/storage]

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: helixgitpx
      POSTGRES_PWD: helixgitpx_dev
      POSTGRES_SEEDS: postgres
    depends_on: [postgres]
    ports: ["7233:7233"]

  temporal-ui:
    image: temporalio/ui:2.30
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8080:8080"]

  vault:
    image: hashicorp/vault:1.17
    cap_add: [IPC_LOCK]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports: ["8200:8200"]

  ollama:
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes: [ollamadata:/root/.ollama]

  prometheus:
    image: prom/prometheus:v2.54.1
    ports: ["9090:9090"]
    volumes: [./deploy/dev/prometheus.yml:/etc/prometheus/prometheus.yml:ro, promdata:/prometheus]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports: ["3000:3000"]
    volumes: [grafanadata:/var/lib/grafana, ./deploy/dev/grafana-provisioning:/etc/grafana/provisioning:ro]

  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports: ["3200:3200", "4317:4317", "4318:4318"]
    volumes: [./deploy/dev/tempo.yaml:/etc/tempo.yaml:ro, tempodata:/var/tempo]

  loki:
    image: grafana/loki:3.1.0
    ports: ["3100:3100"]
    volumes: [lokidata:/loki]

volumes:
  pgdata:
  kafkadata:
  redisdata:
  meilidata:
  osdata:
  qdrantdata:
  ollamadata:
  promdata:
  grafanadata:
  tempodata:
  lokidata:
