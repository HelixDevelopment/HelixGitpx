# deploy/helm/helixgitpx/values-staging.yaml
# Staging overlay — full parity with prod, reduced scale.

global:
  env: staging
  region: eu-west-1
  imageRegistry: ghcr.io/vasic-digital/helixgitpx
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []
  domain: staging.helixgitpx.example.com
  dataClassification: internal
  spire:
    trustDomain: staging.helixgitpx.example.com
  logging:
    level: debug
    sampling: 0.1
  tracing:
    samplingRate: 0.2

# ---------- Core microservices ------------------------------
services:
  apiGateway:
    enabled: true
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi   }
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 20
      targetCPU: 70
    flags: { requirePAT: false, allowOIDCAdHoc: true }

  authService:
    enabled: true
    replicas: 2
    resources:
      requests: { cpu: 250m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 512Mi }

  repoService:
    enabled: true
    replicas: 3
    resources:
      requests: { cpu: 500m, memory: 512Mi }
      limits:   { cpu: 1,    memory: 1Gi   }
    hpa: { enabled: true, minReplicas: 3, maxReplicas: 30, targetCPU: 65 }

  orgService:        { enabled: true, replicas: 2 }
  teamService:       { enabled: true, replicas: 2 }
  upstreamService:   { enabled: true, replicas: 2 }
  adapterPool:       { enabled: true, replicas: 5, perProviderMaxConcurrency: 20 }
  webhookGateway:    { enabled: true, replicas: 3 }
  gitIngress:        { enabled: true, replicas: 3, storage: 200Gi }
  syncOrchestrator:  { enabled: true, replicas: 3 }
  conflictResolver:  { enabled: true, replicas: 3 }
  crdtService:       { enabled: true, replicas: 2 }
  policyService:     { enabled: true, replicas: 2 }
  auditService:      { enabled: true, replicas: 2 }
  billingService:    { enabled: true, replicas: 2 }
  notifyService:     { enabled: true, replicas: 2 }
  liveEvents:        { enabled: true, replicas: 3 }
  searchService:     { enabled: true, replicas: 2 }

  aiService:
    enabled: true
    replicas: 2
    inference:
      vllm:
        enabled: true
        replicas: 1
        model: "meta-llama/Llama-3.1-8B-Instruct"
        gpu: { enabled: true, count: 1, type: "nvidia.com/gpu" }
      ollama:
        enabled: true
        replicas: 1
        models: ["qwen2.5-coder:7b", "llama3.2:3b"]

# ---------- Platform dependencies ---------------------------
postgres:
  enabled: true
  instances: 3
  storage:
    size: 200Gi
    storageClass: nvme-ssd
  backup:
    enabled: true
    destinationPath: "s3://helixgitpx-staging-backups/postgres/"

kafka:
  enabled: true
  replicas: 3
  storage: 500Gi
  retentionHours: 168       # 7d staging
  tieredStorageEnabled: false

redis:
  enabled: true
  architecture: replication
  replicas: 2
  persistence: { enabled: true, size: 20Gi }

opensearch:
  enabled: true
  nodes: 3
  storage: 500Gi

meilisearch:
  enabled: true
  replicas: 2
  storage: 100Gi

qdrant:
  enabled: true
  replicas: 2
  storage: 200Gi

temporal:
  enabled: true
  replicas: 2

spire:
  enabled: true

istio:
  enabled: true
  ambient: true

observability:
  prometheus:
    enabled: true
    retentionTime: 30d
    remoteWrite:
      - url: http://mimir-distributor.observability:8080/api/v1/push
  loki:       { enabled: true, retention: 30d }
  tempo:      { enabled: true, retention: 7d }
  pyroscope:  { enabled: true, retention: 14d }

kyverno:
  enabled: true

featureFlags:
  aiConflictAutoApply: true
  aiShadowMode: true
  wasmPluginsEnabled: true
  experimentalBitbucketDC: true
  requireSignedCommitsOnMain: false
