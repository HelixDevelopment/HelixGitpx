# deploy/k8s/overlays/prod-eu/kustomization.yaml
# Kustomize overlay for prod-eu applying environment-specific patches
# on top of base manifests. The base is rendered from the Helm chart.
#
# Note: production flows go through Helm + Argo CD for most resources.
# Kustomize is used for environment-specific add-ons, emergency patches,
# and resources that aren't ideally templated in Helm.
---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: helixgitpx

resources:
  - ../../base                         # the Helm-rendered base
  - namespaces.yaml
  - prod-eu-only/                      # extra resources scoped to this env

namePrefix: ""
commonLabels:
  app.kubernetes.io/env: prod-eu
  app.kubernetes.io/managed-by: argocd
  helixgitpx.io/region: eu-west-1
commonAnnotations:
  meta.helxigitpx.io/change-request: "CR-XXXX"
  meta.helixgitpx.io/owner: "platform@helixgitpx.example.com"

images:
  - name: ghcr.io/vasic-digital/helixgitpx/api-gateway
    newTag: "1.0.0"
    digest: "sha256:REPLACE_ME_WITH_DIGEST"
  - name: ghcr.io/vasic-digital/helixgitpx/repo-service
    newTag: "1.0.0"
    digest: "sha256:REPLACE_ME_WITH_DIGEST"

patches:
  # Prod-eu raises replicas for request-heavy services.
  - target:
      kind: Deployment
      name: api-gateway
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 20
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests
        value: { cpu: "1", memory: "1Gi" }
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits
        value: { cpu: "2", memory: "2Gi" }

  # Pin adapter-pool to a dedicated node pool with public egress.
  - target:
      kind: Deployment
      name: adapter-pool
    patch: |-
      - op: add
        path: /spec/template/spec/nodeSelector
        value: { workload-class: egress }
      - op: add
        path: /spec/template/spec/tolerations
        value:
          - key: dedicated
            operator: Equal
            value: egress
            effect: NoSchedule

  # Stricter Istio authorization for prod.
  - path: overlays/authz-policies-prod.yaml
    target:
      kind: AuthorizationPolicy

  # Forbid imagePullPolicy: Always in prod (to prevent tag drift).
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/part-of=helixgitpx"
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent

configMapGenerator:
  - name: helixgitpx-env-config
    literals:
      - HELIXGITPX_ENV=prod-eu
      - HELIXGITPX_REGION=eu-west-1
      - HELIXGITPX_LOG_LEVEL=info
      - HELIXGITPX_TRACE_SAMPLING=0.01
      - HELIXGITPX_FEATURES_WASM_PLUGINS=true
      - HELIXGITPX_FEATURES_AI_CONFLICT_AUTO_APPLY=true
      - HELIXGITPX_FEATURES_AI_CLOUD_ROUTING=false

secretGenerator:
  # Secrets provisioned by ESO from Vault — keys only, values injected.
  - name: helixgitpx-env-secrets
    type: Opaque
    behavior: create
    envs:
      - prod-eu-secrets-keys.env

generatorOptions:
  disableNameSuffixHash: true

replacements:
  # Inject current release tag into deployments.
  - source:
      kind: ConfigMap
      name: helixgitpx-env-config
      fieldPath: data.HELIXGITPX_VERSION
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.metadata.labels.[app.kubernetes.io/version]

---
# namespaces.yaml referenced above
apiVersion: v1
kind: Namespace
metadata:
  name: helixgitpx
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
    istio.io/dataplane-mode: ambient
  annotations:
    helixgitpx.io/data-classification: confidential
